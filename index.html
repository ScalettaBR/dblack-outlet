<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D'Black Outlet</title>

<!-- Fonte moderna (pode trocar depois pela exata da sua logo) -->
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>
*{box-sizing:border-box}
body { margin:0; font-family:'Teko', sans-serif; letter-spacing:1px; background:#0a0a0a; color:#fff; }

header {
 display:flex; justify-content:space-between; align-items:center;
 padding:15px 20px; background:#111; position:sticky; top:0;
}

.logo { display:flex; align-items:center; gap:10px; }
.logo img { width:45px; border-radius:50%; }

button {
 background:#facc15; border:none; padding:10px 14px;
 border-radius:12px; cursor:pointer; font-weight:600;
}

.banner {
 padding:60px 20px;
 text-align:center;
 background:linear-gradient(135deg,#111,#222);
}

.container { padding:20px; }

.grid {
 display:grid;
 grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
 gap:15px;
}

.card {
 background:#18181b;
 padding:12px;
 border-radius:18px;
 transition:0.3s;
}

.card:hover { transform:translateY(-5px); }
.card img { width:100%; border-radius:12px; }

input {
 width:100%; padding:10px;
 border-radius:10px; border:none;
 margin-bottom:10px;
}

.filtros {
 display:flex; flex-wrap:wrap; gap:8px; margin-bottom:15px;
}

.hidden { display:none; }

@media(max-width:600px){
 .banner h1{font-size:22px}
}
</style>
</head>
<body>

<header>
<div class="logo">
<img src="logo.png" onerror="this.style.display='none'">
<h2>D'BLACK <span style="color:#facc15">OUTLET</span></h2>
</div>
<div>
<button onclick="mostrarCliente()">Loja</button>
<button onclick="mostrarLogin()">Admin</button>
</div>
</header>

<div class="banner">
<h1>🔥 Estilo, Qualidade e Preço Baixo 🔥</h1>
<p>Multimarcas com as melhores ofertas</p>
</div>

<!-- LOGIN -->
<div id="login" class="container hidden">
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<!-- CLIENTE -->
<div id="cliente" class="container">

<input id="busca" placeholder="Buscar produto..." onkeyup="buscar()">

<div class="filtros">
<button onclick="filtrar('Todos')">Todos</button>
<button onclick="filtrar('Calçados')">Calçados</button>
<button onclick="filtrar('Camisas')">Camisas</button>
<button onclick="filtrar('Bermudas')">Bermudas</button>
<button onclick="filtrar('Calças')">Calças</button>
</div>

<div class="grid" id="lista"></div>

<h3>Carrinho</h3>
<div id="carrinho"></div>
<p id="total"></p>
<button onclick="finalizar()">Finalizar no WhatsApp</button>
</div>

<!-- ADMIN -->
<div id="admin" class="container hidden">
<input id="nome" placeholder="Nome">
<input id="preco" placeholder="Preço">
<input id="imagem" placeholder="URL imagem">
<input id="categoria" placeholder="Categoria">
<button onclick="salvarProduto()">Salvar</button>

<h3>Produtos</h3>
<div id="listaAdmin"></div>
</div>

<script>
const firebaseConfig = {
 apiKey: "AIzaSyC_vXz5dXrBRgZN3KciVKvyNGnZ47sNh7w",
 authDomain: "d-black-outlet-d8f3c.firebaseapp.com",
 projectId: "d-black-outlet-d8f3c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let produtos = [];
let carrinhoItens = [];
let filtroAtual = 'Todos';

function mostrarCliente(){
 document.getElementById('cliente').classList.remove('hidden');
 document.getElementById('admin').classList.add('hidden');
 document.getElementById('login').classList.add('hidden');
}

function mostrarLogin(){
 document.getElementById('login').classList.remove('hidden');
 document.getElementById('cliente').classList.add('hidden');
}

function login(){
 const emailVal = document.getElementById('email').value;
 const senhaVal = document.getElementById('senha').value;

 auth.signInWithEmailAndPassword(emailVal, senhaVal)
 .then(()=>{
   document.getElementById('login').classList.add('hidden');
   document.getElementById('admin').classList.remove('hidden');
 })
 .catch(()=> alert('Erro no login'));
}

async function carregar(){
 const snap = await db.collection('produtos').get();
 produtos = snap.docs.map(doc=>({id:doc.id, ...doc.data()}));
 render();
 renderAdmin();
}

function filtrar(cat){ filtroAtual = cat; render(); }

function buscar(){
 const t = document.getElementById('busca').value.toLowerCase();
 render(produtos.filter(p=>p.nome.toLowerCase().includes(t)));
}

function render(listaProdutos = produtos){
 const lista = document.getElementById('lista');
 lista.innerHTML='';
 listaProdutos.forEach((p,i)=>{
  if(filtroAtual!='Todos' && p.categoria!=filtroAtual) return;
  lista.innerHTML+=`<div class='card'>
  <img src='${p.imagem}'>
  <h4>${p.nome}</h4>
  <p>${p.categoria}</p>
  <p>R$ ${p.preco}</p>
  <button onclick='addCarrinho(${i})'>Comprar</button>
  </div>`;
 });
}

function renderAdmin(){
 const listaAdmin = document.getElementById('listaAdmin');
 listaAdmin.innerHTML='';
 produtos.forEach(p=>{
  listaAdmin.innerHTML+=`<div class='card'>
  <h4>${p.nome}</h4>
  <button onclick='excluirProduto("${p.id}")'>Excluir</button>
  </div>`;
 });
}

async function excluirProduto(id){
 await db.collection('produtos').doc(id).delete();
 carregar();
}

function addCarrinho(i){
 carrinhoItens.push(produtos[i]);
 renderCarrinho();
}

function renderCarrinho(){
 let total=0;
 const carrinhoDiv = document.getElementById('carrinho');
 carrinhoDiv.innerHTML='';
 carrinhoItens.forEach(p=>{
  total+=p.preco;
  carrinhoDiv.innerHTML+=`<p>${p.nome} - R$ ${p.preco}</p>`;
 });
 document.getElementById('total').innerText='Total: R$ '+total;
}

function finalizar(){
 let msg='Pedido:%0A';
 carrinhoItens.forEach(p=> msg+=`${p.nome} - R$ ${p.preco}%0A`);
 window.open(`https://wa.me/5542999296088?text=${msg}`);
}

async function salvarProduto(){
 const nome = document.getElementById('nome').value;
 const preco = document.getElementById('preco').value;
 const imagem = document.getElementById('imagem').value;
 const categoria = document.getElementById('categoria').value;

 if(!nome || !preco || !imagem || !categoria){ alert('Preencha tudo'); return; }

 await db.collection('produtos').add({ nome, preco:Number(preco), imagem, categoria });
 carregar();
}

carregar();
</script>

</body>
</html>
