<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D'Black Outlet</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>
body { margin:0; font-family: Arial; background:#0a0a0a; color:#fff; }
header { display:flex; justify-content:space-between; padding:15px; }
button { background:#facc15; border:none; padding:10px; border-radius:12px; cursor:pointer; margin:3px; }
.container { padding:20px; }
.grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap:20px; }
.card { background:#18181b; padding:15px; border-radius:20px; }
.card img { width:100%; border-radius:15px; }
.hidden { display:none; }
</style>
</head>
<body>

<header>
<h2>D'BLACK OUTLET</h2>
<div>
<button onclick="mostrarCliente()">Loja</button>
<button onclick="mostrarLogin()">Admin</button>
</div>
</header>

<div id="login" class="container hidden">
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<div id="cliente" class="container">

<!-- FILTROS -->
<div>
<button onclick="filtrar('Todos')">Todos</button>
<button onclick="filtrar('Calçados')">Calçados</button>
<button onclick="filtrar('Camisas')">Camisas</button>
<button onclick="filtrar('Bermudas')">Bermudas</button>
<button onclick="filtrar('Calças')">Calças</button>
</div>

<div class="grid" id="lista"></div>

<h3>Carrinho</h3>
<div id="carrinho"></div>
<p id="total"></p>
</div>

<div id="admin" class="container hidden">
<h3>Admin</h3>
<input id="nome" placeholder="Nome">
<input id="preco" placeholder="Preço">
<input id="imagem" placeholder="Imagem URL">
<input id="categoria" placeholder="Categoria">
<button onclick="salvarProduto()">Salvar</button>

<h3>Produtos cadastrados</h3>
<div id="listaAdmin"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC_vXz5dXrBRgZN3KciVKvyNGnZ47sNh7w",
  authDomain: "d-black-outlet-d8f3c.firebaseapp.com",
  projectId: "d-black-outlet-d8f3c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let produtos = [];
let carrinhoItens = [];
let filtroAtual = 'Todos';

function mostrarCliente(){
  cliente.classList.remove('hidden');
  admin.classList.add('hidden');
}

function mostrarLogin(){ login.classList.remove('hidden'); }

function login(){
 auth.signInWithEmailAndPassword(email.value, senha.value)
 .then(()=>{ login.classList.add('hidden'); admin.classList.remove('hidden'); })
}

async function carregar(){
 const snap = await db.collection('produtos').get();
 produtos = snap.docs.map(doc=>({id:doc.id, ...doc.data()}));
 render();
 renderAdmin();
}

function filtrar(cat){
 filtroAtual = cat;
 render();
}

function render(){
 lista.innerHTML='';
 produtos.forEach((p,i)=>{
   if(filtroAtual!='Todos' && p.categoria!=filtroAtual) return;
   lista.innerHTML+=`<div class='card'>
   <img src='${p.imagem}'>
   <h4>${p.nome}</h4>
   <p>${p.categoria}</p>
   <p>R$ ${p.preco}</p>
   <button onclick='addCarrinho(${i})'>Comprar</button>
   </div>`;
 });
}

function renderAdmin(){
 listaAdmin.innerHTML='';
 produtos.forEach(p=>{
   listaAdmin.innerHTML+=`<div class='card'>
   <h4>${p.nome}</h4>
   <button onclick='excluirProduto("${p.id}")'>Excluir</button>
   </div>`;
 });
}

async function excluirProduto(id){
 await db.collection('produtos').doc(id).delete();
 carregar();
}

function addCarrinho(i){
 carrinhoItens.push(produtos[i]);
 renderCarrinho();
}

function renderCarrinho(){
 let total=0;
 carrinho.innerHTML='';
 carrinhoItens.forEach(p=>{
 total+=p.preco;
 carrinho.innerHTML+=`<p>${p.nome} - R$ ${p.preco}</p>`;
 });
 total.innerText='Total: R$ '+total;
}

async function salvarProduto(){
 await db.collection('produtos').add({
 nome:nome.value,
 preco:Number(preco.value),
 imagem:imagem.value,
 categoria:categoria.value
 });
 carregar();
}

carregar();
</script>

</body>
</html>
