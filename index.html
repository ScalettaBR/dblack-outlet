<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D'Black Outlet Ultra</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>
body { margin:0; font-family: Arial; background:#000; color:#fff; }
header { display:flex; justify-content:space-between; padding:15px; }
.banner { background:#111; padding:40px; text-align:center; }
button { background:#facc15; border:none; padding:10px; cursor:pointer; }
.container { padding:20px; }
.grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap:20px; }
.card { background:#18181b; padding:10px; border-radius:12px; }
.card img { width:100%; border-radius:10px; }
.hidden { display:none; }
</style>
</head>
<body>

<header>
<h2>D'BLACK <span style="color:#facc15">OUTLET</span></h2>
<div>
<button onclick="mostrarCliente()">Loja</button>
<button onclick="mostrarLogin()">Admin</button>
</div>
</header>

<div class="banner">
<h1>🔥 Ofertas Exclusivas 🔥</h1>
</div>

<div id="login" class="container hidden">
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<div id="cliente" class="container">
<input id="busca" placeholder="Buscar..." onkeyup="buscar()">
<div class="grid" id="lista"></div>

<h3>Carrinho</h3>
<div id="carrinho"></div>
<p id="total"></p>
<button onclick="finalizar()">Finalizar Pedido</button>
</div>

<div id="admin" class="container hidden">
<h3>Admin</h3>
<input id="nome" placeholder="Nome">
<input id="preco" placeholder="Preço">
<input id="imagem" placeholder="Imagem URL">
<button onclick="salvarProduto()">Salvar</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC_vXz5dXrBRgZN3KciVKvyNGnZ47sNh7w",
  authDomain: "d-black-outlet-d8f3c.firebaseapp.com",
  projectId: "d-black-outlet-d8f3c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let produtos = [];
let carrinhoItens = JSON.parse(localStorage.getItem('carrinho')) || [];

function salvarCarrinho(){ localStorage.setItem('carrinho', JSON.stringify(carrinhoItens)); }

function mostrarCliente(){ cliente.classList.remove('hidden'); }
function mostrarLogin(){ login.classList.remove('hidden'); }

function login(){
 auth.signInWithEmailAndPassword(email.value, senha.value)
 .then(()=>{ login.classList.add('hidden'); admin.classList.remove('hidden'); })
 .catch(()=> alert('Erro'));
}

async function carregar(){
 const snap = await db.collection('produtos').get();
 produtos = snap.docs.map(doc=>doc.data());
 render(produtos);
 renderCarrinho();
}

function buscar(){
 const t = busca.value.toLowerCase();
 render(produtos.filter(p=>p.nome.toLowerCase().includes(t)));
}

function render(listaProdutos){
 lista.innerHTML='';
 listaProdutos.forEach((p,i)=>{
 lista.innerHTML+=`<div class='card'>
 <img src='${p.imagem}'>
 <h4>${p.nome}</h4>
 <p>R$ ${p.preco}</p>
 <button onclick='addCarrinho(${i})'>Adicionar</button>
 </div>`;
 });
}

function addCarrinho(i){
 carrinhoItens.push({...produtos[i], qtd:1});
 salvarCarrinho();
 renderCarrinho();
}

function renderCarrinho(){
 let total=0;
 carrinho.innerHTML='';
 carrinhoItens.forEach((p,i)=>{
 total += p.preco * p.qtd;
 carrinho.innerHTML+=`<p>${p.nome} x${p.qtd} - R$ ${p.preco*p.qtd}
 <button onclick='remover(${i})'>❌</button></p>`;
 });
 total.innerText='Total: R$ '+total;
}

function remover(i){ carrinhoItens.splice(i,1); salvarCarrinho(); renderCarrinho(); }

function finalizar(){
 let msg='Pedido:%0A';
 carrinhoItens.forEach(p=> msg+=`${p.nome} x${p.qtd}%0A`);
 window.open(`https://wa.me/5542999296088?text=${msg}`);
}

async function salvarProduto(){
 await db.collection('produtos').add({ nome:nome.value, preco:Number(preco.value), imagem:imagem.value });
 carregar();
}

carregar();
</script>

</body>
</html>
